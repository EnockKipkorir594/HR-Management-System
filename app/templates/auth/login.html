{% extends 'base.html' %}
{% block auth_content %}
<div class="d-flex align-items-center justify-content-center"
     style="min-height:100vh; background:linear-gradient(135deg,#1a6b5a,#0d4435);">
  <div class="card p-4" style="width:100%;max-width:400px;">
    <div class="text-center mb-4">
      <i class="fas fa-building fa-2x text-success"></i>
      <h4 class="mt-2 fw-bold">HR &amp; Payroll System</h4>
      <p class="text-muted small">Multimedia University of Kenya — Group 4</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Enter username" required autofocus/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter password" required/>
        </div>
      </div>
      <div class="form-check mb-3">
        <input type="checkbox" name="remember" class="form-check-input" id="remember"/>
        <label class="form-check-label small" for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="fas fa-sign-in-alt me-2"></i>Login
      </button>
    </form>

    <p class="text-center text-muted small mt-3">
      Default admin: <strong>admin</strong> / <strong>Admin@1234</strong>
    </p>
  </div>
</div>
{% endblock %}
